<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Residencial Village Damha III | App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .portal-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: linear-gradient(rgba(10,31,26,0.9), rgba(10,31,26,0.9)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
        }

        .portal-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .portal-header .logo {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 1rem;
            display: block;
        }

        .portal-header p {
            color: var(--accent);
            letter-spacing: 0.3em;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            width: 100%;
            max-width: 500px;
        }

        .portal-card {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            padding: 3rem 2rem;
            text-align: center;
            text-decoration: none;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .portal-card:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.05);
        }

        .portal-card h2 {
            font-size: 2rem;
            color: #fff;
            margin: 0;
        }

        .portal-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .portal-card .icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .portal-footer {
            margin-top: 5rem;
            color: var(--text-secondary);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            opacity: 0.5;
        }

        @media (min-width: 768px) {
            .portal-grid {
                grid-template-columns: 1fr 1fr;
                max-width: 800px;
            }
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <header class="portal-header reveal">
            <span class="logo outfit-bold">VD|III</span>
            <p>PORTAL DO MORADOR</p>
        </header>

        <div class="portal-grid">
            <a href="agenda.html" class="portal-card reveal" data-delay="0.2">
                <div class="icon">🍷</div>
                <h2>CONFRARIA</h2>
                <p>Agenda de Food Trucks e Eventos</p>
            </a>
            
            <a href="notices.html" class="portal-card reveal" data-delay="0.4">
                <div class="icon">🔔</div>
                <h2>AVISOS</h2>
                <p>Comunicados e Alertas Oficiais</p>
            </a>
        </div>

        <footer class="portal-footer reveal" data-delay="0.6">
            RESIDENCIAL VILLAGE DAMHA III
        </footer>
    </div>

    <script src="main.js"></script>
    <script>
        // Trigger reveal animations
        setTimeout(() => {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
        }, 100);
    </script>
</body>
</html>
